name: 自动部署到服务器

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: 拉取镜像并部署到服务器
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/haku-ink/website

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 同步部署文件到服务器
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT || '22' }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: ${{ secrets.SERVER_PATH }}
          ARGS: >-
            -rlgoDzvc --delete
            --exclude=.git
            --exclude=.github
            --exclude=node_modules
            --exclude=.next
            --exclude=.env
            --exclude=.env.runtime
            --exclude=*.db
            --exclude=*.db-journal
            --exclude=*.db-shm
            --exclude=*.db-wal
            --exclude=*.tar
            --exclude=*.tar.gz

      - name: 服务器部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ secrets.SERVER_PATH }}"

            cat > .env.runtime <<EOF
            SERVER_PUBLIC_IP=${{ secrets.SERVER_PUBLIC_IP }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            EOF

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "${{ env.IMAGE }}:${{ github.sha }}"
            docker tag "${{ env.IMAGE }}:${{ github.sha }}" "${{ env.IMAGE }}:main"

            docker compose down || true
            docker compose --env-file .env.runtime pull
            docker compose --env-file .env.runtime up -d
            rm -f .env.runtime
            docker logout ghcr.io || true
            docker image prune -f
