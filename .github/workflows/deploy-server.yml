name: 自动部署到服务器

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: 同步代码并重启服务
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建部署镜像
        run: docker build -t website:1.0 .

      - name: 导出部署镜像
        run: docker save website:1.0 | gzip > website-image.tar.gz

      - name: 同步代码到服务器
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT || '22' }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: ${{ secrets.SERVER_PATH }}
          ARGS: >-
            -rlgoDzvc --delete
            --exclude=.git
            --exclude=.github
            --exclude=node_modules
            --exclude=.next
            --exclude=.env
            --exclude=.env.runtime
            --exclude=*.db
            --exclude=*.db-journal
            --exclude=*.db-shm
            --exclude=*.db-wal
            --exclude=*.tar
            --exclude=*.tar.gz

      - name: 上传部署镜像到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: website-image.tar.gz
          target: ${{ secrets.SERVER_PATH }}

      - name: 服务器部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ secrets.SERVER_PATH }}"

            cat > .env.runtime <<EOF
            SERVER_PUBLIC_IP=${{ secrets.SERVER_PUBLIC_IP }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            EOF

            gzip -dc website-image.tar.gz | docker load
            rm -f website-image.tar.gz

            docker compose down || true
            docker compose --env-file .env.runtime up -d --no-build
            rm -f .env.runtime
            docker image prune -f
